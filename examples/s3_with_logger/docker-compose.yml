# MinIO — a self-contained, S3-compatible endpoint for running the
# s3_with_logger example locally, with no AWS account required.
#
#   docker compose up -d        # start MinIO and create the bucket
#   go run .                    # run the scenario against it
#   docker compose down -v      # stop and wipe the data
#
# Defaults line up 1-to-1 with main.go's fallbacks, so `go run .` works with no
# environment variables set:
#
#   S3 API    -> http://localhost:9000   (S3_ENDPOINT)
#   Console   -> http://localhost:9001   (web UI, login below)
#   bucket    -> example-bucket          (S3_BUCKET)
#   user/pass -> minioadmin / minioadmin (S3_ACCESS_KEY_ID / S3_SECRET_ACCESS_KEY)
services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # web console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - minio-data:/data

  # One-shot init container: waits for MinIO, then creates the bucket the
  # example expects. It exits 0 once done — `docker compose up -d` stays healthy.
  createbucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/example-bucket &&
      echo 'bucket example-bucket ready';
      "

volumes:
  minio-data:
