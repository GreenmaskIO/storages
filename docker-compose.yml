# Local Linux test runner for the filesystem-like backends (directory, inmemory).
#
# It lets you reproduce the Linux CI job from any host — notably macOS, where the
# default filesystem is case-insensitive and Unix permission modes are not fully
# honored. Inside the container you get a real case-sensitive ext4 filesystem and
# genuine 0640/0750 modes, so on-disk platform behavior is exercised for real.
#
# NOTE: this runs Linux containers only. Windows path behavior cannot be tested
# this way (Windows containers need a Windows host); that is covered by the
# windows-latest job in .github/workflows/ci.yml.
#
# Keep the image tag in sync with the `go` directive in go.mod.
services:
  test:
    image: golang:1.26
    working_dir: /src
    volumes:
      - .:/src
      - gomod:/go/pkg/mod
      - gocache:/root/.cache/go-build
    # Default command; override it via `docker compose run --rm test <cmd>`.
    # -count=1 disables Go's test-result cache so the tests always run for real
    # (compile cache is kept, so builds stay fast).
    command: go test -count=1 ./ ./directory/... ./inmemory/... ./internal/...

volumes:
  gomod:
  gocache:
