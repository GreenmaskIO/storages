name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  # The same gates as ci.yml: a tag is releasable only if the full matrix, the
  # race detector and the end-to-end tests all pass on the tagged commit.
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./...

  test-race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Test with race detector
        run: go test -race -count=1 ./...

  test-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Test against real backends
        run: go test -count=1 -timeout 20m ./...
        working-directory: tests/integration

  # Creates a draft GitHub release whose body is the CHANGELOG.md section
  # matching the tag (tag v0.1.0 -> section "## [0.1.0]"). The draft is
  # published manually after review.
  release:
    needs: [test, test-race, test-integration]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Extract changelog section for ${{ github.ref_name }}
        run: |
          awk -v ver="${GITHUB_REF_NAME#v}" '
            /^## \[/ { in_section = ($0 ~ "^## \\[" ver "\\]") ; next }
            /^\[[^]]+\]: / { next }
            in_section' CHANGELOG.md > release-notes.md
          if ! grep -q '[^[:space:]]' release-notes.md; then
            echo "::error::CHANGELOG.md has no \"## [${GITHUB_REF_NAME#v}]\" section; add it before tagging" >&2
            exit 1
          fi
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --draft \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md
