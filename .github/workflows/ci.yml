name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # Cross-platform validation: the filesystem-like backends (directory over
  # afero.OsFs, inmemory over afero.MemMapFs) run the same conformance suite on
  # every supported OS. These need no Docker, so they run on the full matrix and
  # catch path/separator regressions on Windows.
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        run: go build ./...
      - name: Test (fs backends + shared code)
        run: go test ./ ./directory/... ./inmemory/... ./internal/...

  # The s3/azure/ssh unit tests spin up containers via testcontainers, so they
  # run on Ubuntu where Docker is available. This job also carries the race
  # detector for the whole module: Linux is the only runner we make CGO
  # toolchain assumptions on, and the packages gated behind Docker include the
  # ones with shared mutable state (ssh's lazily-established, clone-shared
  # connection), so restricting -race to the Docker-free packages would skip
  # exactly the code most worth checking.
  test-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Test with race detector (all backends)
        run: go test -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
